<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harpagia Wiki</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0e1a;--surface:#13152a;--surface2:#1a1d35;--border:#2d3060;--text:#c8cce8;--text-dim:#7880b0;--link:#818cf8;--link-hover:#a5b4fc;--gold:#f59e0b;--green:#22c55e;--red:#ef4444;--header-h:56px;--sidebar-w:220px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-hover);text-decoration:underline}
img{image-rendering:pixelated;image-rendering:crisp-edges}
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#0a0b18;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100}
#logo{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:1px;white-space:nowrap;cursor:pointer}
#logo span{color:var(--link)}
#back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:13px}
#back-btn:hover{color:var(--text);border-color:var(--link)}
#search-wrap{position:relative;flex:1;max-width:400px}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:4px;font-size:14px;outline:none}
#search:focus{border-color:var(--link)}
#search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;max-height:300px;overflow-y:auto;z-index:200;display:none}
#search-results .sr{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#search-results .sr:hover{background:var(--surface2)}
#search-results .sr img{width:24px;height:24px;object-fit:contain}
#search-results .sr-cat{font-size:11px;color:var(--text-dim);margin-left:auto}
#nav-links{display:flex;gap:4px;margin-left:auto}
#nav-links a{padding:6px 10px;border-radius:4px;font-size:13px;color:var(--text-dim)}
#nav-links a:hover{background:var(--surface2);color:var(--link);text-decoration:none}
#layout{display:flex;margin-top:var(--header-h)}
#sidebar{width:var(--sidebar-w);min-height:calc(100vh - var(--header-h));background:var(--surface);border-right:1px solid var(--border);padding:12px 0;position:fixed;top:var(--header-h);overflow-y:auto}
#sidebar .cat-header{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
#sidebar .cat-header:hover{color:var(--text)}
#sidebar .cat-links a{display:block;padding:5px 24px;color:var(--text-dim);font-size:13px}
#sidebar .cat-links a:hover{color:var(--link);text-decoration:none;background:var(--surface2)}
#main{margin-left:var(--sidebar-w);padding:24px;min-height:calc(100vh - var(--header-h));max-width:1100px}
.breadcrumb{font-size:12px;color:var(--text-dim);margin-bottom:16px}
.breadcrumb a{color:var(--text-dim)}
.breadcrumb a:hover{color:var(--link)}
.breadcrumb span{margin:0 6px}
.page-title{font-size:26px;font-weight:700;color:#fff;border-bottom:2px solid var(--border);padding-bottom:12px;margin-bottom:16px}
.page-subtitle{color:var(--text-dim);margin-bottom:20px;font-size:14px}
.infobox{float:right;clear:right;background:var(--surface);border:1px solid var(--border);margin:0 0 20px 24px;min-width:200px;max-width:260px}
.infobox-title{padding:8px 12px;font-weight:700;font-size:14px;text-align:center;color:#fff}
.infobox-img{text-align:center;padding:16px;background:var(--surface2)}
.infobox-img img{max-width:120px;max-height:120px}
.infobox table{width:100%;border-collapse:collapse}
.infobox td{padding:5px 10px;border-top:1px solid var(--border);font-size:13px}
.infobox td:first-child{color:var(--text-dim);font-weight:600;width:50%}
.infobox td:last-child{text-align:right;font-weight:600;color:#fff}
.wiki-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.wiki-table th{background:var(--surface2);padding:8px 12px;text-align:left;border:1px solid var(--border);color:var(--gold);font-size:13px;cursor:pointer;white-space:nowrap;user-select:none}
.wiki-table th:hover{background:#22254a}
.wiki-table td{padding:7px 12px;border:1px solid var(--border);font-size:13px}
.wiki-table tr:hover td{background:var(--surface2)}
.sort-asc::after{content:' ▲'}
.sort-desc::after{content:' ▼'}
.tier{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.t1{background:#374151;color:#9ca3af}.t2{background:#164e63;color:#67e8f9}.t3{background:#14532d;color:#86efac}
.t4{background:#713f12;color:#fcd34d}.t5{background:#7c2d12;color:#fb923c}.t6{background:#581c87;color:#d8b4fe}
.t7{background:#1e3a8a;color:#93c5fd}.t8{background:#064e3b;color:#6ee7b7}.t9{background:#7f1d1d;color:#fca5a5}
.t10{background:#1c1917;color:#f97316;border:1px solid #f97316}.t11{background:#0f172a;color:#f59e0b;border:1px solid #f59e0b}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:.15s;text-align:center}
.card:hover{border-color:var(--link);background:var(--surface2);transform:translateY(-2px)}
.card img{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto 8px}
.card .card-name{font-size:13px;font-weight:600;color:#fff}
.card .card-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.ability-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ability-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.ability-card:hover{border-color:var(--link);background:var(--surface2)}
.ability-card img{width:48px;height:48px;flex-shrink:0}
.fish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.fish-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:.15s}
.fish-card:hover{border-color:var(--link);background:var(--surface2)}
.fish-card .fish-sprites{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.fish-card .fish-sprites img{width:48px;height:48px;object-fit:contain}
.fish-card .fish-name{text-align:center;font-weight:700;color:#fff;margin-bottom:4px}
.fish-card .fish-stats{display:flex;justify-content:space-around;font-size:12px;color:var(--text-dim)}
.pet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.pet-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;text-align:center;transition:.15s}
.pet-card:hover{border-color:var(--link);background:var(--surface2)}
.pet-card img{width:72px;height:72px;object-fit:contain;margin:0 auto 8px;display:block}
.pet-card .pet-name{font-size:13px;font-weight:600;color:#fff}
.home-hero{background:linear-gradient(135deg,#0a0b18,#1a1d35);border:1px solid var(--border);border-radius:8px;padding:32px;margin-bottom:24px;text-align:center}
.home-hero h1{font-size:36px;color:var(--gold);margin-bottom:8px}
.home-hero p{color:var(--text-dim);font-size:16px}
.home-categories{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.home-cat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px 16px;cursor:pointer;transition:.15s;text-align:center}
.home-cat:hover{border-color:var(--link);background:var(--surface2);transform:translateY(-2px)}
.home-cat .hc-icon{font-size:28px;margin-bottom:8px}
.home-cat .hc-name{font-weight:700;color:#fff;margin-bottom:4px}
.home-cat .hc-count{font-size:12px;color:var(--text-dim)}
.detail-desc{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--link);padding:14px 16px;margin-bottom:20px;font-size:14px}
.section-header{font-size:16px;font-weight:700;color:var(--gold);border-bottom:1px solid var(--border);padding-bottom:6px;margin:20px 0 12px}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}
.stat-val{font-weight:700;color:#fff}
.ss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.ss-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px}
.ss-card:hover{border-color:var(--link);background:var(--surface2)}
.ss-card img{width:56px;height:56px;flex-shrink:0;object-fit:contain}
.ss-name{font-weight:700;color:#fff;margin-bottom:2px}
.ss-desc{font-size:12px;color:var(--text-dim)}
.rank-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:700;margin:1px}
.rank1{background:#374151;color:#d1d5db}.rank2{background:#164e63;color:#7dd3fc}.rank3{background:#713f12;color:#fcd34d}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.cs-card{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:12px;cursor:pointer;transition:.15s}
.cs-card:hover{border-color:var(--link);background:var(--surface2)}
.cs-name{font-weight:700;color:#fff;font-size:13px}
.mob-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0;vertical-align:middle;margin-right:6px}
.clearfix::after{content:'';display:table;clear:both}
@media(max-width:768px){#sidebar{display:none}#main{margin-left:0}.infobox{float:none;margin:0 0 20px;max-width:100%}}
</style>
</head>

let _hist=[],_sec='home',_id=null;
function navigate(s,id){if(_sec)_hist.push({s:_sec,i:_id});_sec=s;_id=id||null;render();window.scrollTo(0,0);}
function goBack(){if(!_hist.length)return;const p=_hist.pop();_sec=p.s;_id=p.i;render();window.scrollTo(0,0);}
function fmt(n){if(n===null||n===undefined)return'—';return n.toLocaleString();}
function tierBadge(t){if(!t)return'<span class="tier t1">Special</span>';return`<span class="tier t${t}">Tier ${t}</span>`;}
function mobSprite(name){return IMG+'assets_npc_'+name.toLowerCase().replace(/ /g,'_')+'.png';}
function bc(trail){return'<div class="breadcrumb">'+trail.map((t,i)=>i===trail.length-1?`<b>${t.l}</b>`:`<a href="#" onclick="${t.o};return false">${t.l}</a>`).join('<span> › </span>')+'</div>';}
function sortTable(tid,col){
  const t=document.getElementById(tid);if(!t)return;
  const rows=Array.from(t.querySelectorAll('tbody tr'));
  const th=t.querySelectorAll('th')[col];
  const asc=th.classList.contains('sort-asc');
  t.querySelectorAll('th').forEach(h=>h.classList.remove('sort-asc','sort-desc'));
  rows.sort((a,b)=>{const av=a.cells[col].dataset.val||a.cells[col].textContent;const bv=b.cells[col].dataset.val||b.cells[col].textContent;const an=parseFloat(av),bn=parseFloat(bv);if(!isNaN(an)&&!isNaN(bn))return asc?bn-an:an-bn;return asc?bv.localeCompare(av):av.localeCompare(bv);});
  th.classList.add(asc?'sort-desc':'sort-asc');
  const tb=t.querySelector('tbody');rows.forEach(r=>tb.appendChild(r));
}
function toggleCat(id){const el=document.getElementById(id);const ar=document.getElementById(id+'-arrow');if(el.style.display==='none'){el.style.display='';ar.textContent='▼';}else{el.style.display='none';ar.textContent='►';}}

function render(){
  const main=document.getElementById('main');
  if(_sec==='home')main.innerHTML=rHome();
  else if(_sec==='monsters')main.innerHTML=_id?rMonsterD(_id):rMonsters();
  else if(_sec==='abilities')main.innerHTML=_id?rAbilityD(_id):rAbilities();
  else if(_sec==='weapons')main.innerHTML=_id?rWeaponD(_id):rWeapons();
  else if(_sec==='armor')main.innerHTML=_id?rArmorD(_id):rArmor();
  else if(_sec==='fishing')main.innerHTML=_id?rFishD(_id):rFishing();
  else if(_sec==='soulstones')main.innerHTML=_id?rSSD(_id):rSoulstones();
  else if(_sec==='pets')main.innerHTML=rPets();
  else if(_sec==='cardsets')main.innerHTML=rCardSets();
  else if(_sec==='locations')main.innerHTML=_id?rLocationD(_id):rLocations();
  else if(_sec==='sigils')main.innerHTML=rSigils();
  else if(_sec==='mechanics')main.innerHTML=rMechanics();
  else if(_sec==='mining')main.innerHTML=rMining();
  else if(_sec==='scrolls')main.innerHTML=rScrolls();
  else main.innerHTML=rHome();
}

<div class="section-header">Monsters in This Zone</div>
<table class="wiki-table" id="lmt"><thead><tr>

  return bc([{l:'Main Page',o:"navigate('home')"},{l:'Sigils'}])+`
<div class="page-title">Sigils</div>
<div class="page-subtitle">Equippable passive items. 4 tiers of increasing power. All require level 140.</div>
<table class="wiki-table" id="sigt"><thead><tr>
  <th onclick="sortTable('sigt',0)">Sigil</th>
  <th onclick="sortTable('sigt',1)">Bonus</th>
  <th onclick="sortTable('sigt',2)">Level Required</th>
</tr></thead><tbody>
${sigils.map(s=>`<tr>
  <td><img class="mob-icon" src="${IMG}assets_sigils_${s.slug}.png" onerror="this.style.display='none'" alt="">${s.name}</td>

  <td data-val="${s.levelRequired}">${s.levelRequired}</td>

<div class="detail-desc">Sigils are equippable passive items that provide a flat bonus. Higher-tier sigils provide greater bonuses. All sigils require combat level 140 to equip.</div>
<div class="ss-grid" style="margin-top:16px">
${sigils.map(s=>`<div class="ss-card">
  <img src="${IMG}assets_sigils_${s.slug}.png" onerror="this.style.display='none'" alt="${s.name}" style="width:56px;height:56px">
  <div><div class="ss-name">${s.name}</div>
  <div class="ss-desc">Passive Bonus: +${s.bonus}</div>

  </div>

<div class="section-header">Gems & Minerals (${MINERALS.length})</div>

function rCardSets(){
  return bc([{l:'Main Page',o:"navigate('home')"},{l:'Card Sets'}])+`
<div class="page-title">Card Sets</div>
<div class="page-subtitle">${CARD_SETS.length} card sets. Complete a set for passive bonuses.</div>
<div style="margin-bottom:12px"><input id="csq" type="text" placeholder="Search card sets…" oninput="filterCS(this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:4px;font-size:14px;width:300px;outline:none"></div>
<div class="cs-grid" id="csgrid">

function filterCS(q){q=q.toLowerCase();document.querySelectorAll('#csgrid .cs-card').forEach(el=>{el.style.display=el.querySelector('.cs-name').textContent.toLowerCase().includes(q)?'':'none';});}

function rMechanics(){
  return bc([{l:'Main Page',o:"navigate('home')"},{l:'Mechanics'}])+`
<div class="page-title">Game Mechanics</div>
<div class="section-header">Combat Stats</div>
<table class="wiki-table"><thead><tr><th>Stat</th><th>Description</th></tr></thead><tbody>
<tr><td>Power</td><td>Base attack damage</td></tr>
<tr><td>Defence</td><td>Reduces incoming damage</td></tr>
<tr><td>Speed</td><td>Attack frequency — higher speed = more attacks per turn</td></tr>
<tr><td>Weaponry</td><td>Additional weapon-based bonus on top of Power</td></tr>
<tr><td>HP</td><td>Hit Points — reaching 0 loses the battle</td></tr>
</tbody></table>
<div class="section-header">Tiers</div>
<div class="detail-desc">Monsters span 11 tiers. Higher tiers have more HP and stronger stats but grant more EXP and better loot. Tier 10 creatures are bosses. Tier 11 is mythic.</div>
<div class="section-header">Soulstones</div>
<div class="detail-desc">Passive items that drop from high-tier enemies. Each soulstone has a prefix determining its effect and comes in Rank 1–3, with Rank 3 providing maximum bonus. ${SOULSTONES.length} different prefixes exist.</div>
<div class="section-header">Card Sets</div>
<div class="detail-desc">Monster Cards are collected by defeating enemies. Completing a Card Set (themed group) unlocks passive bonuses. There are ${CARD_SETS.length} card sets total.</div>
<div class="section-header">Abilities</div>
<div class="detail-desc">Special combat moves costing MP with a turn-based cooldown. Unlocked and upgraded using Gems. Higher-level abilities cost more MP but have stronger effects. ${ABILITIES.length} abilities available.</div>
<div class="section-header">Fishing</div>
<div class="detail-desc">Produces food for healing. Cooked fish heal ~25% more than raw. ${FISH.length} fish species across fishing levels 1–196+.</div>
<div class="section-header">Armour Slots</div>
<div class="detail-desc">Three armour slots exist: Helmet, Chestplate, and Greaves. Each has 12 tiers from Bronze (level 1/4/7) up to Viridian (level 151). Amulets provide stat bonuses and have 20 ranks. Sigils (level 140) provide additional passive bonuses.</div>
<div class="section-header">Mining</div>
<div class="detail-desc">${MINERALS.length} gems and minerals can be mined starting from level 1. All minerals yield Geo Fragments used in Base Camp Research. ${COMPONENTS.length} crafting components (Bronze–Abyssal) are used to forge and upgrade armour and weapons.</div>
<div class="section-header">Potions</div>
<div class="detail-desc">Two potions are available from the Imbuing skill: Sanguine Tonic (level 31) and Soulbinder Elixir (level 81). These provide combat buffs during battles.</div>
<div class="section-header">Scrolls</div>
<div class="detail-desc">${SCROLLS.length} one-time-use scrolls exist. Experience scrolls grant 50,000–1,250,000 EXP in any skill. Utility scrolls include Scroll of Haste (−1h expedition time), Scroll of the Artisan (+50% skilling ring effect permanently), and Scroll of the Warlord (+50% combat ring effect permanently).</div>
<div class="section-header">Unique Loot</div>
<div class="detail-desc">Some monsters drop rare unique items with a fixed probability per kill (e.g. "1 in 1150"). Tier 10 bosses have the rarest drops (1 in 9,001 to 1 in 45,000).</div>`;}

// SEARCH
const _idx=[];
MOBS.forEach(m=>_idx.push({t:'Monster',l:m.name,img:mobSprite(m.name),o:`navigate('monsters',${m.id})`}));
ABILITIES.forEach(a=>_idx.push({t:'Ability',l:a.name,img:`${IMG}assets_abilities_${a.id.toLowerCase()}.png`,o:`navigate('abilities','${a.id}')`}));
FISH.forEach(f=>{const s=f.name.toLowerCase().replace(/ /g,'_');_idx.push({t:'Fish',l:f.name,img:`${IMG}assets_food_${s}.png`,o:`navigate('fishing','${f.name}')`});});
SOULSTONES.forEach(ss=>{const s=ss.name.toLowerCase().replace(/ /g,'_');_idx.push({t:'Soulstone',l:ss.name,img:`${IMG}assets_soulstones_${s}.png`,o:`navigate('soulstones','${ss.name}')`});});
LOCATIONS.forEach(l=>_idx.push({t:'Location',l:l.name,img:'',o:`navigate('locations','${l.name}')`}));
WEAPONS.forEach(w=>{const s=w.name.toLowerCase().replace(/'/g,'').replace(/ /g,'_');_idx.push({t:'Weapon',l:w.name,img:`${IMG}assets_weapons_${s}.png`,o:`navigate('weapons','${w.name.replace(/'/g,"\\'")}')`});});
ARMOR.forEach(a=>_idx.push({t:'Chestplate',l:a.name,img:'',o:`navigate('armor','${a.name}')`}));
HELMETS.forEach(a=>_idx.push({t:'Helmet',l:a.name,img:'',o:`navigate('armor','${a.name}')`}));
GREAVES.forEach(a=>_idx.push({t:'Greaves',l:a.name,img:'',o:`navigate('armor','${a.name}')`}));
AMULETS.forEach(a=>_idx.push({t:'Amulet',l:a.name,img:`${IMG}assets_amulets_${a.slug}.png`,o:`navigate('armor','${a.name}')`}));
MINERALS.forEach(m=>{const s=m.name.toLowerCase().replace(/ /g,'_');_idx.push({t:'Mineral',l:m.name,img:`${IMG}assets_minerals_${s}.png`,o:`navigate('mining')`});});
COMPONENTS.forEach(c=>_idx.push({t:'Component',l:c.name,img:'',o:`navigate('mining')`}));
SCROLLS.forEach(s=>_idx.push({t:'Scroll',l:s.name,img:`${IMG}assets_scrolls_${s.id}.png`,o:`navigate('scrolls')`}));

document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  const res=document.getElementById('search-results');
  if(!q){res.style.display='none';return;}
  const m=_idx.filter(x=>x.l.toLowerCase().includes(q)).slice(0,10);
  if(!m.length){res.style.display='none';return;}
  res.innerHTML=m.map(x=>`<div class="sr" onclick="${x.o};document.getElementById('search').value='';document.getElementById('search-results').style.display='none'"><img src="${x.img}" onerror="this.style.display='none'" alt=""><span>${x.l}</span><span class="sr-cat">${x.t}</span></div>`).join('');
  res.style.display='block';
});
document.addEventListener('click',e=>{if(!e.target.closest('#search-wrap'))document.getElementById('search-results').style.display='none';});

navigate('home');
</script>
</body>
</html>
